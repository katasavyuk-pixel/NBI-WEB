<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="dotGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0%" stop-color="#67e8ff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#ffffff"/>
  <rect x=".75" y=".75" width="62.5" height="62.5" rx="13.5" fill="none" stroke="rgba(26,36,64,.10)" stroke-width="1"/>

  <!-- NBI! symbol — viewBox internal: 150x60, scaled and centered -->
  <g transform="translate(5, 18) scale(0.36)" fill="#1a2440">
    <!-- N main strokes -->
    <rect x="0" y="0" width="9" height="60" rx="1"/>
    <polygon points="9,0 18,0 54,48 54,0 63,0 63,60 54,60 18,12 18,60 9,60"/>
    <!-- N eco verticals (offset, lighter) -->
    <rect x="13" y="6" width="3" height="54" rx=".5" opacity=".4"/>
    <rect x="67" y="0" width="3" height="54" rx=".5" opacity=".4"/>
    <!-- B as one shape with two inner cuts -->
    <path fill-rule="evenodd" d="M 80 0 H 105 Q 119 0 119 13 Q 119 23 110 27 Q 124 30 124 43 Q 124 60 105 60 H 80 Z M 89 8 V 23 H 105 Q 110 23 110 15.5 Q 110 8 105 8 Z M 89 32 V 52 H 105 Q 114 52 114 42 Q 114 32 105 32 Z"/>
    <!-- I body -->
    <rect x="132" y="0" width="9" height="42" rx="1.5"/>
  </g>
  <!-- Cyan dot (the iconic accent) -->
  <circle cx="53" cy="50" r="6" fill="url(#dotGlow)" opacity=".7"/>
  <circle cx="53" cy="50" r="3.6" fill="#00d4ff"/>
</svg>
