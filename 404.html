<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Página no encontrada · NBI</title>
<meta name="description" content="La página que buscas no existe. Vuelve al inicio o solicita un diagnóstico." />
<meta name="robots" content="noindex,follow" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" media="print" onload="this.media='all'">
<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap">
</noscript>

<style>
  :root{
    --bg:#ffffff; --bg-2:#f5f7fb;
    --ink:#1a2440; --ink-2:#3a4665; --ink-mute:#5a6580;
    --cyan:#00d4ff; --cyan-deep:#0aa9ce;
    --grad: linear-gradient(120deg, #00d4ff 0%, #0aa9ce 50%, #1a2440 100%);
    --font-display:"Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-serif:"Instrument Serif", ui-serif, Georgia, serif;
  }
  *,*::before,*::after{ box-sizing: border-box }
  html, body{ margin: 0; padding: 0 }
  body{
    background: var(--bg); color: var(--ink);
    font-family: var(--font-display); -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    min-height: 100vh; display: grid; place-items: center;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(0,212,255,.06), transparent 60%),
      radial-gradient(700px 500px at -10% 30%, rgba(26,36,64,.03), transparent 55%),
      var(--bg);
  }
  main{
    text-align: center; padding: 32px 24px; max-width: 640px;
  }
  .code{
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(96px, 18vw, 200px); line-height: 1;
    background: var(--grad); -webkit-background-clip: text;
    background-clip: text; color: transparent;
    letter-spacing: -0.04em; margin: 0;
  }
  h1{
    font-family: var(--font-display); font-weight: 600;
    font-size: clamp(24px, 4vw, 36px);
    letter-spacing: -0.02em; margin: 18px 0 12px;
  }
  h1 .ital{ font-family: var(--font-serif); font-style: italic; font-weight: 400 }
  p{
    color: var(--ink-2); font-size: 16px; max-width: 48ch; margin: 0 auto 28px;
  }
  .actions{
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-top: 8px;
  }
  .btn{
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 22px; border-radius: 999px; font-weight: 600;
    text-decoration: none; font-size: 14px; transition: transform .2s, box-shadow .2s;
  }
  .btn-primary{
    background: var(--ink); color: #fff;
    box-shadow: 0 6px 24px rgba(26,36,64,.18);
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 10px 30px rgba(26,36,64,.25) }
  .btn-ghost{
    color: var(--ink); border: 1px solid rgba(26,36,64,.16);
  }
  .btn-ghost:hover{ background: var(--bg-2) }
  .btn:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px }
  .arr{ transition: transform .2s }
  .btn:hover .arr{ transform: translateX(3px) }
  .meta{
    margin-top: 36px; font-size: 12px; color: var(--ink-mute);
    font-family: ui-monospace, "JetBrains Mono", monospace;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
</style>
</head>
<body>

<main>
  <p class="code">404</p>
  <h1>Esta ruta <span class="ital">no existe</span>.</h1>
  <p>O bien el enlace está roto, o la página fue movida. Volvamos al inicio — desde ahí puedes solicitar un diagnóstico o explorar los productos.</p>

  <div class="actions">
    <a href="/" class="btn btn-primary">
      Volver al inicio
      <span class="arr">→</span>
    </a>
    <a href="/#cta" class="btn btn-ghost">
      Solicitar diagnóstico
    </a>
  </div>

  <div class="meta">NBI · Nexora Business Intelligence</div>
</main>

</body>
</html>
